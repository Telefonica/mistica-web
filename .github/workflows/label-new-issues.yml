name: Label new issues

on:
    issues:
        types: [opened]

jobs:
    label:
        runs-on: ubuntu-latest
        permissions:
            issues: write
        steps:
            - uses: actions/github-script@v7
              with:
                  script: |
                      github.rest.issues.addLabels({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        labels: ['to-groom'],
                      });
