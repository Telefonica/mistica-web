# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    merge_group:
        branches: [master]

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        container: telefonica/web-builder:chromium93.0.4577-node24-1.0.0

        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Install dependencies
              env:
                  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
              run: yarn install --immutable --immutable-cache

            - run: yarn lint
            - run: yarn prettier-check
            - run: yarn circular-dependencies
            - run: yarn build
            - run: yarn ts-check
            - run: yarn test --ci
            - run: NO_BUILD=true yarn test-ssr --ci

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: failed-screenshots-ssr
                  path: src/**/__diff_output__/*-diff.png

    build-acceptance:
        runs-on: ubuntu-latest
        container: telefonica/web-builder:chromium93.0.4577-node24-1.0.0
        strategy:
            matrix:
                shard: [1, 2, 3]
            fail-fast: false

        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Install dependencies
              env:
                  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
              run: yarn install --immutable --immutable-cache

            - run: yarn storybook-static
            - run: yarn test-acceptance --ci --shard=${{ matrix.shard }}/${{ strategy.job-total }}

            - uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: failed-screenshots-${{ matrix.shard }}
                  path: src/**/__diff_output__/*-diff.png

    build-upload-failed-screenshots:
        runs-on: ubuntu-latest
        container: telefonica/web-builder:chromium93.0.4577-node24-1.0.0
        needs: [build, build-acceptance]
        if: '!cancelled()'

        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Install dependencies
              env:
                  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
              run: yarn install --immutable --immutable-cache

            - if: needs.build.result == 'failure' || needs.build-acceptance.result == 'failure'
              uses: actions/download-artifact@v4
              with:
                  pattern: failed-screenshots-*
                  merge-multiple: true
                  path: src/

            - name: 'Upload failed screenshot diffs'
              uses: './.github/actions/upload-failed-screenshots'
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  azure-account-name: ${{ secrets.AZURE_ACCOUNT_NAME }}
                  azure-account-key: ${{ secrets.AZURE_ACCOUNT_KEY }}

    validate-pr-title:
        # Validates the PR title against the conventional commit format. Needed for
        # semantic-release to generate release notes. Only runs on pull requests; it
        # is skipped (not failed) on push and merge_group runs, so the aggregate job
        # below still passes in those contexts.
        name: Validate PR title
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        steps:
            - uses: amannn/action-semantic-pull-request@v5
              with:
                  types: |
                      fix
                      feat
                      chore
                      revert
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Aggregate job that summarizes the result of all the required CI jobs.
    # This is the only job that needs to be configured as a required status check
    # in branch protection (tf-github-cdo-repos), instead of requiring each job
    # (and each `build-acceptance` matrix shard) individually.
    # See: https://github.com/orgs/community/discussions/8031
    ci-required-checks:
        name: CI required checks passed
        runs-on: ubuntu-latest
        needs: [build, build-acceptance, validate-pr-title]
        # Always run so the check resolves even when a needed job fails or is cancelled.
        if: always()
        steps:
            - name: Check that all required jobs succeeded
              if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
              run: |
                  echo "One or more required CI jobs failed or were cancelled."
                  exit 1
            - name: All required jobs succeeded
              run: echo "All required CI jobs passed."
###
