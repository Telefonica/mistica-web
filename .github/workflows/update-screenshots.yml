name: update_screenshots

on:
    workflow_dispatch:
        inputs:
            branch:
                description: 'Branch name'
                required: true
                default: ''

jobs:
    update-screenshots:
        name: update-screenshots
        runs-on: ubuntu-latest
        container: telefonica/web-builder:chromium93.0.4577-node24-1.0.0
        strategy:
            matrix:
                shard: [1, 2, 3]
            fail-fast: false
        env:
            ACTION_INPUT_BRANCH: ${{ github.event.inputs.branch || 'master' }}
        steps:
            - name: checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.FLOW_GITHUB_TOKEN }}
                  ref: ${{ env.ACTION_INPUT_BRANCH }}
            - name: Install dependencies
              env:
                  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
              run: yarn install --immutable --immutable-cache

            - run: yarn storybook-static
            - run: yarn test-acceptance -u --ci --shard=${{ matrix.shard }}/${{ strategy.job-total }}

            - name: upload-changes
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: updated-screenshots-${{ matrix.shard }}
                  path: src/**/__image_snapshots__/*.png

    upload-changes:
        needs: update-screenshots
        runs-on: ubuntu-latest
        if: ${{ always() }}
        env:
            ACTION_INPUT_BRANCH: ${{ github.event.inputs.branch || 'master' }}
        steps:
            - name: checkout
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.FLOW_GITHUB_TOKEN }}
                  ref: ${{ env.ACTION_INPUT_BRANCH }}

            - name: Download updated screenshots
              uses: actions/download-artifact@v4
              with:
                  pattern: updated-screenshots-*
                  merge-multiple: true

            - name: commit-changes
              run: |
                  git status --porcelain
                  if [ -n "$(git status --porcelain)" ]; then
                    git config --global user.name "${GITHUB_ACTOR}"
                    git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
                    git add -A
                    git commit -m "[bot] Update screenshots"
                    git push origin HEAD:"${ACTION_INPUT_BRANCH}"
                  else
                    echo "No changes to commit"
                  fi
